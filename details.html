<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détail mission | Mwindjou</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: ['class','[data-theme="dark"]'],
            theme: {
                extend: {
                    colors: {
                        'tech-bg':     'var(--bg-color)',
                        'tech-card':   'var(--card-color)',
                        'tech-text':   'var(--text-main)',
                        'tech-dim':    'var(--text-dim)',
                        'tech-accent': 'var(--accent)',
                        'tech-border': 'var(--border-color)',
                    },
                    fontFamily: {
                        sans:    ['DM Sans','system-ui','sans-serif'],
                        display: ['Syne','sans-serif'],
                        mono:    ['JetBrains Mono','monospace'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-tech-bg text-tech-text font-sans antialiased">

<div id="nav-placeholder"></div>

<div id="page-content">
    <div style="min-height:80vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem">
        <div style="width:32px;height:32px;border-radius:50%;border:2px solid var(--border-color);border-top-color:var(--accent);animation:spin .7s linear infinite"></div>
        <p style="font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--text-dim)">Chargement...</p>
    </div>
</div>

<div id="footer-placeholder"></div>

<script src="components.js"></script>

/* ── RENDU ─────────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', () => {
    const id = new URLSearchParams(location.search).get('id');
    const c  = DATA[id];

    if (!c) {
        document.getElementById('page-content').innerHTML = `
        <div style="min-height:70vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.25rem;text-align:center;padding:2rem">
            <i class="fa-solid fa-triangle-exclamation" style="font-size:2rem;color:var(--accent)"></i>
            <p style="font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:700;color:var(--text-main)">Expérience introuvable.</p>
            <a href="projects.html" class="btn-ghost" style="text-decoration:none"><i class="fa-solid fa-arrow-left"></i> Retour aux projets</a>
        </div>`;
        return;
    }

    document.title = `${c.title} | Mwindjou`;

    document.getElementById('page-content').innerHTML = `

    <!-- EN-TÊTE -->
    <section class="pt-32 pb-12 relative">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

            <a href="projects.html"
               style="display:inline-flex;align-items:center;gap:.5rem;font-size:.875rem;color:var(--text-dim);text-decoration:none;margin-bottom:2rem;transition:color .15s"
               onmouseenter="this.style.color='var(--accent)'" onmouseleave="this.style.color='var(--text-dim)'">
                <i class="fa-solid fa-arrow-left"></i> Retour aux projets
            </a>

            <h1 style="font-family:'Syne',sans-serif;font-size:clamp(1.8rem,5vw,2.75rem);font-weight:800;letter-spacing:-.03em;color:var(--text-main);margin-bottom:.4rem">
                ${c.title}
            </h1>
            <p style="font-family:'JetBrains Mono',monospace;font-size:.82rem;color:${c.color.text};margin-bottom:1.25rem">
                ${c.subtitle}
            </p>
            <p style="font-size:.95rem;color:var(--text-dim);line-height:1.78;max-width:640px;margin-bottom:1.75rem">
                ${c.desc}
            </p>

            ${c.website ? `
            <a href="${c.website}" target="_blank" class="btn-ghost" style="text-decoration:none">
                <i class="fa-solid fa-globe"></i> Visiter le site officiel
            </a>` : ''}

        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

            <h2 style="font-size:1.15rem;font-weight:700;color:var(--text-main);margin-bottom:2rem;padding-left:1rem;border-left:3px solid var(--accent)">
                Détail des Missions Réalisées
            </h2>

                <div class="glass rounded-xl overflow-hidden group"
                     style="transition:box-shadow .3s;display:flex;flex-direction:column"
                     onmouseenter="this.style.boxShadow='0 16px 48px ${c.color.glow}'"
                     onmouseleave="this.style.boxShadow=''">

                    <div style="height:140px;background:rgba(255,255,255,.02);border-bottom:1px solid var(--border-color);display:flex;align-items:center;justify-content:center;flex-shrink:0">
                        <i class="${m.icon}"
                           style="font-size:2.8rem;color:var(--border-color);transition:all .35s"
                           onmouseenter="this.style.transform='scale(1.12)';this.style.color='${c.color.text}'"
                           onmouseleave="this.style.transform='';this.style.color='var(--border-color)'"></i>
                    </div>

                    <!-- Contenu -->
                    <div style="padding:1.25rem;display:flex;flex-direction:column;flex:1">

                        <p style="font-size:.82rem;color:var(--text-dim);line-height:1.72;margin-bottom:.9rem;flex:1">${m.desc}</p>

                        <!-- Tags -->
                        <div style="display:flex;flex-wrap:wrap;gap:.35rem;margin-bottom:${m.pdf ? '.9rem' : '0'}">
                            ${m.tags.map(t => `
                            <span style="font-family:'JetBrains Mono',monospace;font-size:.65rem;padding:2px 8px;border-radius:6px;color:${c.color.text};background:${c.color.bg};border:1px solid ${c.color.border}">${t}</span>

                        <a href="${m.pdf}" target="_blank"
                           style="display:inline-flex;align-items:center;gap:.4rem;font-family:'JetBrains Mono',monospace;font-size:.7rem;color:${c.color.text};text-decoration:none;padding-top:.75rem;border-top:1px solid var(--border-color);transition:opacity .15s"
                           onmouseenter="this.style.opacity='.7'" onmouseleave="this.style.opacity='1'">
                            <i class="fa-solid fa-file-pdf"></i> Voir la fiche PDF
                        </a>` : ''}
                    </div>
                </div>`).join('')}

        </div>
    </section>`;
});

<style>
@keyframes spin { to { transform: rotate(360deg); } }
</style>

</body>
</html>
