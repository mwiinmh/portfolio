                    <div class="flex flex-wrap gap-3 mt-6">
                        ${c.website !== '#' ? `<a href="${c.website}" target="_blank" class="btn-ghost" style="text-decoration:none;font-size:.82rem;padding:8px 18px"><i class="fa-solid fa-arrow-up-right-from-square"></i> Site officiel</a>` : ''}
                        ${c.pdf ? `<a href="${c.pdf}" download class="btn-ghost" style="text-decoration:none;font-size:.82rem;padding:8px 18px"><i class="fa-solid fa-file-arrow-down"></i> Rapport PDF</a>` : ''}
                    </div>
                </div>

                <!-- Stats -->
                <div class="flex gap-3 flex-shrink-0">
                    <div class="glass rounded-xl px-5 py-4 text-center">
                        <p style="font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;color:${c.hex}">${c.missions.length}</p>
                        <p style="font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--text-dim);margin-top:.2rem">Missions</p>
                    </div>
                    <div class="glass rounded-xl px-5 py-4 text-center">
                        <p style="font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;color:${c.hex}">${allBlocs.length}</p>
                        <p style="font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--text-dim);margin-top:.2rem">Blocs BTS</p>
                    </div>
                    ${pdfCount > 0 ? `<div class="glass rounded-xl px-5 py-4 text-center">
                        <p style="font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;color:${c.hex}">${pdfCount}</p>
                        <p style="font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--text-dim);margin-top:.2rem">PDFs</p>
                    </div>` : ''}
                </div>
            </div>
        </div>
    </section>

    <!-- ── TIMELINE MISSIONS ──────────────────────────────── -->
    <section class="pb-24">
        <div class="max-w-5xl mx-auto px-6 sm:px-10 lg:px-14">

            <div class="mb-10">
                <span class="section-label">Missions réalisées</span>
                <h2 class="section-title">Timeline</h2>
            </div>

            <div class="relative" style="padding-left:3rem;border-left:1px solid var(--border-color)">
                ${c.missions.map((m, i) => `

                <div class="relative mb-14 reveal" style="transition-delay:${i * 0.08}s">

                    <!-- Dot -->
                    <div style="position:absolute;left:-3.65rem;top:0;width:44px;height:44px;border-radius:12px;background:${c.bghex};border:1px solid ${c.hex}40;display:flex;align-items:center;justify-content:center;color:${c.hex};font-size:1rem;backdrop-filter:blur(8px)">
                        <i class="${m.icon}"></i>
                    </div>

                    <!-- Card -->
                    <div class="glass rounded-2xl p-6 md:p-7">

                        <!-- Header -->
                        <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:.75rem;margin-bottom:1.25rem">
                            <div>
                                <h3 style="font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:700;color:var(--text-main)">${m.title}</h3>
                                <p style="font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--text-dim);margin-top:.2rem">
                                    <i class="fa-regular fa-calendar" style="margin-right:.3rem"></i>${m.date}
                                </p>
                            </div>
                            ${m.pdf ? `<a href="${m.pdf}" download style="font-family:'JetBrains Mono',monospace;font-size:.68rem;color:${c.hex};text-decoration:none;display:flex;align-items:center;gap:.3rem;padding:4px 10px;border-radius:6px;background:${c.bghex};border:1px solid ${c.hex}30;white-space:nowrap" onmouseenter="this.style.opacity='.75'" onmouseleave="this.style.opacity='1'">
                                <i class="fa-solid fa-file-arrow-down"></i> PDF
                            </a>` : ''}
                        </div>

                        <!-- Grille contexte / actions / résultat -->
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">

                            <!-- Contexte -->
                            <div style="background:var(--bg-color);border:1px solid var(--border-color);border-radius:12px;padding:1rem">
                                <p style="font-family:'JetBrains Mono',monospace;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);margin-bottom:.6rem">
                                    <i class="fa-solid fa-circle-question" style="margin-right:.3rem"></i>Contexte
                                </p>
                                <p style="font-size:.82rem;color:var(--text-dim);line-height:1.72">${m.context}</p>
                            </div>

                            <!-- Actions -->
                            <div style="background:var(--bg-color);border:1px solid var(--border-color);border-radius:12px;padding:1rem">
                                <p style="font-family:'JetBrains Mono',monospace;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);margin-bottom:.6rem">
                                    <i class="fa-solid fa-list-check" style="margin-right:.3rem"></i>Actions
                                </p>
                                <ul style="display:flex;flex-direction:column;gap:.4rem">
                                    ${m.actions.map(a => `
                                    <li style="display:flex;align-items:flex-start;gap:.4rem;font-size:.8rem;color:var(--text-dim);line-height:1.5">
                                        <span style="color:${c.hex};margin-top:.15rem;flex-shrink:0">›</span>${a}
                                    </li>`).join('')}
                                </ul>
                            </div>

                            <!-- Résultat -->
                            <div style="background:${c.bghex};border:1px solid ${c.hex}25;border-radius:12px;padding:1rem">
                                <p style="font-family:'JetBrains Mono',monospace;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:${c.hex};margin-bottom:.6rem">
                                    <i class="fa-solid fa-chart-line" style="margin-right:.3rem"></i>Résultat
                                </p>
                                <p style="font-size:.82rem;color:var(--text-main);line-height:1.72;font-weight:500">${m.result}</p>
                            </div>
                        </div>

                        <!-- Tags + Blocs BTS -->
                        <div style="display:flex;flex-wrap:wrap;gap:.4rem;margin-top:1rem;padding-top:.875rem;border-top:1px solid var(--border-color)">
                            ${m.tags.map(t => `
                            <span style="font-family:'JetBrains Mono',monospace;font-size:.65rem;padding:2px 9px;border-radius:6px;background:${c.bghex};color:${c.hex};border:1px solid ${c.hex}25">${t}</span>`).join('')}
                            ${m.blocs.map(b => `
                            <span title="${BTS_LABELS[b]}" style="font-family:'JetBrains Mono',monospace;font-size:.65rem;padding:2px 9px;border-radius:6px;background:rgba(var(--accent-rgb),.08);color:var(--accent);border:1px solid rgba(var(--accent-rgb),.18);cursor:help">
                                <i class="fa-solid fa-graduation-cap" style="font-size:.55rem;margin-right:.2rem"></i>${b}
                            </span>`).join('')}
                        </div>
                    </div>
                </div>`).join('')}
            </div>

            <!-- Retour -->
            <div class="mt-4 text-center">
                <a href="projects.html" class="btn-ghost" style="text-decoration:none">
                    <i class="fa-solid fa-arrow-left"></i> Retour aux projets
                </a>
            </div>
        </div>
    </section>`;

    // Lancer les reveals
    setTimeout(() => {
        if (typeof initReveal === 'function') initReveal();
    }, 50);
});

@keyframes spin { to { transform: rotate(360deg); } }
</script>

<style>
@keyframes spin { to { transform: rotate(360deg); } }
</style>

</body>
</html>
