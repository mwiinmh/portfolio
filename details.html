document.addEventListener('DOMContentLoaded', () => {
    const id = new URLSearchParams(location.search).get('id');
    const c  = DATA[id];

    if (!c) {
        document.getElementById('page-content').innerHTML = `
        <div class="detail-error">
            <i class="fa-solid fa-triangle-exclamation detail-error__icon"></i>
            <p class="detail-error__title">Expérience introuvable.</p>

<style>
.loader-screen { min-height:80vh; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:1rem; }
.loader-spinner { width:32px; height:32px; border-radius:50%; border:2px solid var(--border-color); border-top-color:var(--accent); animation:spin .7s linear infinite; }
.loader-text { font-family:'JetBrains Mono',monospace; font-size:.7rem; color:var(--text-dim); }
@keyframes spin { to { transform:rotate(360deg); } }

.detail-error { min-height:70vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1.25rem; text-align:center; padding:2rem; }
.detail-error__icon { font-size:2rem; color:var(--accent); }
.detail-error__title { font-family:'Outfit',sans-serif; font-size:1.3rem; font-weight:700; color:var(--text-main); }

.detail-header { padding-top:8rem; padding-bottom:3rem; }
.detail-back { display:inline-flex; align-items:center; gap:.5rem; font-size:.875rem; color:var(--text-dim); text-decoration:none; margin-bottom:2rem; transition:color .15s; }
.detail-back:hover { color:var(--accent); }
.detail-title { font-family:'Outfit',sans-serif; font-size:clamp(1.8rem,5vw,2.75rem); font-weight:800; letter-spacing:-.03em; color:var(--text-main); margin-bottom:.4rem; }
.detail-subtitle { font-family:'JetBrains Mono',monospace; font-size:.82rem; margin-bottom:1.25rem; display:block; }
.detail-desc { font-size:.95rem; color:var(--text-dim); line-height:1.78; max-width:640px; margin-bottom:1.75rem; }

.detail-missions { padding-block:4rem; border-top:1px solid var(--border-color); background:rgba(255,255,255,.012); }
[data-theme="light"] .detail-missions { background:rgba(0,0,0,.015); }
.detail-missions__heading { display:flex; align-items:center; gap:.75rem; font-size:1.1rem; font-weight:700; color:var(--text-main); margin-bottom:2rem; }
.detail-missions__bar { display:block; width:3px; height:1.2em; border-radius:2px; flex-shrink:0; }

.mission-card { background:var(--card-color); border:1px solid var(--border-color); border-radius:14px; overflow:hidden; display:flex; flex-direction:column; transition:border-color .25s, box-shadow .25s, transform .25s; }
.mission-card:hover { border-color:rgba(var(--accent-rgb),.25); transform:translateY(-3px); box-shadow:0 16px 40px rgba(0,0,0,.25); }
[data-theme="light"] .mission-card:hover { box-shadow:0 8px 24px rgba(0,0,0,.08); }
.mission-card__icon-wrap { height:120px; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,.02); border-bottom:1px solid var(--border-color); flex-shrink:0; }
.mission-card__icon { font-size:2.4rem; color:var(--border-color); transition:color .3s, transform .3s; }
.mission-card:hover .mission-card__icon { color:var(--mc, var(--accent)); transform:scale(1.1); }
.mission-card__body { padding:1.25rem; display:flex; flex-direction:column; flex:1; }
.mission-card__title { font-family:'Outfit',sans-serif; font-size:.95rem; font-weight:700; color:var(--text-main); margin-bottom:.6rem; }
.mission-card__desc { font-size:.82rem; color:var(--text-dim); line-height:1.72; margin-bottom:.9rem; flex:1; }
.mission-card__tags { display:flex; flex-wrap:wrap; gap:.35rem; margin-bottom:.5rem; }
.mission-tag { font-family:'JetBrains Mono',monospace; font-size:.65rem; padding:2px 8px; border-radius:6px; border:1px solid; }
.mission-card__pdf { display:inline-flex; align-items:center; gap:.4rem; font-family:'JetBrains Mono',monospace; font-size:.7rem; text-decoration:none; padding-top:.75rem; border-top:1px solid var(--border-color); opacity:.8; transition:opacity .15s; margin-top:.5rem; }
.mission-card__pdf:hover { opacity:1; }
</style>
